<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Поле раскаленных частиц</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body, html {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background-color: #000000; 
			background-size: cover;
			background-position: center;
			transition: background 0.3s ease;
		}
		canvas {
			display: block;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
	<canvas id="canvas"></canvas>
	<script>
		const canvas = document.getElementById('canvas');
		const ctx = canvas.getContext('2d');
		const CONFIG = {
			bgType: 'color',
			bgColor: 'rgb(0, 0, 0,)',
			// bgImage: 
			particleColor: 'rgba(255, 76, 0, 0.8)',
			lineColor: 'rgba(255, 76, 0, ',
			particleSize: 1,
			particleCount: 400,
			lineWidth: 1.0,
			lineLength: 140,
			minSpeed: 0.1,
			maxSpeed: 1.0,
			fps: 60
		};
		let particles = [];
		let lastTime = 0;
		const interval = 1000 / CONFIG.fps;
		function applyBackground() {
			if (CONFIG.bgType === 'image') {
				document.body.style.backgroundImage = `url('${CONFIG.bgImage}')`;
				document.body.style.backgroundColor = 'transparent';
			} else {
				document.body.style.backgroundImage = 'none';
				document.body.style.backgroundColor = CONFIG.bgColor;
			}
		}
		function resizeCanvas() {
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
		}
		window.addEventListener('resize', resizeCanvas);
		resizeCanvas();
		class Particle {
			constructor(isInitial = false) {
				this.reset(isInitial);
			}
			reset(isInitial = false) {
				this.size = Math.random() * CONFIG.particleSize + 1;
				if (isInitial) {
					this.x = Math.random() * canvas.width;
					this.y = Math.random() * canvas.height;
				} else {
					this.spawnAtEdge();
				}
				const angle = Math.random() * Math.PI * 2;
				const speed = Math.random() * (CONFIG.maxSpeed - CONFIG.minSpeed) + CONFIG.minSpeed;
				this.vx = Math.cos(angle) * speed;
				this.vy = Math.sin(angle) * speed;
			}
			spawnAtEdge() {
				const edge = Math.floor(Math.random() * 4);
				const padding = 10;
				if (edge === 0) {
					this.x = Math.random() * canvas.width;
					this.y = -padding;
				} else if (edge === 1) {
					this.x = canvas.width + padding;
					this.y = Math.random() * canvas.height;
				} else if (edge === 2) {
					this.x = Math.random() * canvas.width;
					this.y = canvas.height + padding;
				} else {
					this.x = -padding;
					this.y = Math.random() * canvas.height;
				}
			}
			update() {
				this.x += this.vx;
				this.y += this.vy;
				const padding = 20;
				if (this.x < -padding || this.x > canvas.width + padding ||
					this.y < -padding || this.y > canvas.height + padding) {
					this.reset(false);
				}
			}
			draw() {
				ctx.fillStyle = CONFIG.particleColor;
				ctx.beginPath();
				ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
				ctx.fill();
			}
		}
		function init() {
			particles = [];
			for (let i = 0; i < CONFIG.particleCount; i++) {
				particles.push(new Particle(true));
			}
		}
		function drawLines() {
			for (let i = 0; i < particles.length; i++) {
				for (let j = i + 1; j < particles.length; j++) {
					const dx = particles[i].x - particles[j].x;
					const dy = particles[i].y - particles[j].y;
					const distance = Math.sqrt(dx * dx + dy * dy);
					if (distance < CONFIG.lineLength) {
						const opacity = 1 - (distance / CONFIG.lineLength);
						ctx.strokeStyle = `${CONFIG.lineColor}${opacity})`;
						ctx.lineWidth = CONFIG.lineWidth;
						ctx.beginPath();
						ctx.moveTo(particles[i].x, particles[i].y);
						ctx.lineTo(particles[j].x, particles[j].y);
						ctx.stroke();
					}
				}
			}
		}
		function animate(currentTime) {
			requestAnimationFrame(animate);
			const elapsed = currentTime - lastTime;
			if (elapsed < interval) return;
			lastTime = currentTime - (elapsed % interval);
			ctx.clearRect(0, 0, canvas.width, canvas.height);
			for (let particle of particles) {
				particle.update();
				particle.draw();
			}
			drawLines();
		}
		applyBackground();
		init();
		requestAnimationFrame(animate);
	</script>
</body>
</html>
